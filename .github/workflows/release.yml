name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Run tests
        run: dotnet test NgProductManager.sln

      - name: Publish win-x64 self-contained single-file
        run: |
          dotnet publish src/NgProductManager/NgProductManager.csproj -c Release -r win-x64 -p:SelfContained=true -p:PublishSingleFile=true -p:PublishTrimmed=false -o artifacts/publish/win-x64

      - name: Create zip archive
        run: |
          Compress-Archive -Path artifacts/publish/win-x64/* -DestinationPath artifacts/NgProductManager-win-x64.zip -Force

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/NgProductManager-win-x64.zip
